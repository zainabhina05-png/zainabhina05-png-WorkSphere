name: Auto-Assign Issue on /claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign contributor on /claim
        uses: actions/github-script@v9
        with:
          script: |
            // Ensure this is an issue comment, not a PR comment
            if (context.payload.issue.pull_request) return;

            const body = context.payload.comment.body || '';
            // Match /claim anywhere in the comment (case-insensitive)
            if (!body.toLowerCase().includes('/claim')) return;

            const issueNumber = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            const assignees = context.payload.issue.assignees || [];
            
            // Ignore bot comments
            if (context.payload.comment.user.type === 'Bot') return;

            // 1. Check if issue is already assigned to someone else
            if (assignees.length > 0) {
              const currentAssignees = assignees.map(a => `@${a.login}`).join(', ');
              const alreadyAssignedMsg = `Hi @${commenter}, this issue is already assigned to ${currentAssignees}. Please feel free to check out other unassigned open issues on the repository! 🚀`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: alreadyAssignedMsg
              });
              return;
            }

            // 2. Check active assigned issues for this contributor (max 10 limit)
            const userAssignedIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignee: commenter,
              state: 'open',
              per_page: 100
            });

            // Filter out PRs, keep only issues
            const activeIssuesCount = userAssignedIssues.data.filter(item => !item.pull_request).length;

            if (activeIssuesCount >= 10) {
              const limitMsg = `Hi @${commenter}! You currently have **${activeIssuesCount}** active assigned issues, which reaches our limit of 10 active assigned issues per person. Please submit PRs or resolve your current assigned issues before claiming new ones! Thanks for your contributions! 🚀`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: limitMsg
              });
              return;
            }

            // 3. Assign the issue to commenter
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [commenter]
            });

            // 4. Post assignment confirmation message
            const assignmentMsg = `Hey @${commenter}, awesome to have you on board for this! 🚀

            We've officially assigned issue #${issueNumber} to you. Be sure to check out our [CONTRIBUTING.md](https://github.com/SatyamPandey-07/WorkSphere/blob/main/CONTRIBUTING.md) before starting, and keep your PR scoped to this issue for an easier review process.

            ⏳ Try to open a PR within 6 days. If you need extra time, just drop a quick progress update here and you can keep going.

            Can't wait to see your work. Happy coding! ✨`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: assignmentMsg
            });
