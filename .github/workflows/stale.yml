name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues config
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-message: 'This issue has been inactive for 30 days. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'This issue was closed because it has been inactive for 37 days.'
          stale-issue-label: 'stale'
          
          # PRs config
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-message: 'This pull request has been inactive for 30 days. It will be closed in 7 days if no further activity occurs.'
          close-pr-message: 'This pull request was closed because it has been inactive for 37 days.'
          stale-pr-label: 'stale'
