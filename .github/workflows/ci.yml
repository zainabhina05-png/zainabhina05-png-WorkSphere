name: Continuous Integration

on:
  pull_request:
    branches: [main, master, dev, development]
  push:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xvc2luZy12dWx0dXJlLTEwLmNsZXJrLmFjY291bnRzLmRldiQ
      CLERK_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /ai
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /ai
      NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: /ai
      NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL: /ai
      GROQ_API_KEY: gsk_dummy
      PEXELS_API_KEY: dummy
      WHATSAPP_WEBHOOK_URL: https://example.com/webhook
      WHATSAPP_API_TOKEN: dummy
      WHATSAPP_PHONE_NUMBER_ID: dummy
      TWILIO_ACCOUNT_SID: ACdummy
      TWILIO_AUTH_TOKEN: dummy
      TWILIO_WHATSAPP_FROM: whatsapp:+14155238886
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "465"
      SMTP_USER: dummy@example.com
      SMTP_PASS: dummy
      UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
      UPSTASH_REDIS_REST_TOKEN: dummy
      NEXT_PUBLIC_OSRM_URL: https://router.project-osrm.org
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build Next.js application
        run: npm run build

  auto-approve:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request' && success()
    permissions:
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Auto Approve PR
        uses: hmarr/auto-approve-action@v4
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
