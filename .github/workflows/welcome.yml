name: Welcome & Initial PR Triaging

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome Issue Contributor
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const association = context.payload.issue.author_association;
            const isFirstTime = association === 'FIRST_TIME_CONTRIBUTOR' || association === 'FIRST_TIMER';
            let welcomePrefix = '';
            
            if (isFirstTime) {
              welcomePrefix = `🎉 Welcome to WorkSphere!\nThanks for making your first contribution. Need help? Feel free to ask.\n\n`;
            }
            
            const issueComment = welcomePrefix + `🎉 Thanks for opening this issue!

            We appreciate your contribution.

            Please ensure:
            ✅ Clear description
            ✅ Expected behavior
            ✅ Screenshots if possible

            ---
            🔔 **Update for Contributors:**

            The limit for active assigned issues per person has been increased to 10 (previously 5).

            You can claim this issue by posting a comment with exactly:
            \`/claim\`

            You will have 6 days to complete it! 🚀

            ---
            💡 **Connect & Support:**
            - ⭐ Star the [WorkSphere repository](https://github.com/SatyamPandey-07/WorkSphere) to show your support!
            - 👤 Follow the maintainer on GitHub: [@SatyamPandey-07](https://github.com/SatyamPandey-07)
            - 💼 Connect on LinkedIn: [Satyam Pandey](https://www.linkedin.com/in/satyam-pandey-0b246432a/)
            - 💬 Have questions or queries? Join our [WhatsApp Group](https://chat.whatsapp.com/D3pfq0vSmwd0iR0dFNjj43) or contact via phone at \`+91 9820866720\`.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: issueComment
            });

            // Auto-classify issue type based on title and body content
            const title = (context.payload.issue.title || '').toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();

            const isBug = 
              title.includes('bug') || 
              title.includes('fix') || 
              title.includes('error') || 
              title.includes('fail') || 
              title.includes('crash') ||
              body.includes('steps to reproduce') || 
              body.includes('expected behavior') ||
              body.includes('actual behavior');
              
            const isFeature = 
              title.includes('feature') || 
              title.includes('feat') || 
              title.includes('request') || 
              title.includes('add') ||
              body.includes('feature request') || 
              body.includes('describe the solution you\'d like');

            const isDocs = 
              title.includes('doc') || 
              title.includes('readme') || 
              body.includes('documentation') || 
              body.includes('proposed changes');

            const labelsToAdd = ['ECSoC26', 'needs-review'];
            if (isBug) {
              labelsToAdd.push('bug');
            } else if (isFeature) {
              labelsToAdd.push('feature-request');
            } else if (isDocs) {
              labelsToAdd.push('documentation');
            }

            // Assess if this is a high-quality, well-documented issue to award "good-issue" (+10 XP)
            const issueBody = context.payload.issue.body || '';
            const isDetailed = issueBody.length > 250;
            const hasGoodStructure = 
              issueBody.toLowerCase().includes('steps to reproduce') || 
              issueBody.toLowerCase().includes('expected behavior') || 
              issueBody.toLowerCase().includes('reproduction') ||
              issueBody.toLowerCase().includes('alternatives') ||
              issueBody.toLowerCase().includes('proposed changes');

            if (isDetailed && hasGoodStructure) {
              labelsToAdd.push('good-issue');
            }

            console.log(`Auto-classifying issue #${context.issue.number}:`);
            console.log(`- Title: "${context.payload.issue.title}"`);
            console.log(`- Detected: isBug=${isBug}, isFeature=${isFeature}, isDocs=${isDocs}`);
            console.log(`- Good Issue: ${isDetailed && hasGoodStructure}`);
            console.log(`- Adding labels: ${labelsToAdd.join(', ')}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd
            });

      - name: Welcome PR Contributor & Triage PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            const association = context.payload.pull_request.author_association;
            const isFirstTime = association === 'FIRST_TIME_CONTRIBUTOR' || association === 'FIRST_TIMER';
            
            // 1. Post PR Welcome comment (only when first opened)
            if (context.payload.action === 'opened') {
              let welcomePrefix = '';
              if (isFirstTime) {
                welcomePrefix = `🎉 Welcome to WorkSphere!\nThanks for making your first contribution. Need help? Feel free to ask.\n\n`;
              }
              const prComment = welcomePrefix + `🎉 Thank you for contributing to WorkSphere!

              Please ensure:

              ✅ Tests pass
              ✅ No secrets committed
              ✅ Documentation updated

              ---
              💡 **Connect & Support:**
              - ⭐ Star the [WorkSphere repository](https://github.com/SatyamPandey-07/WorkSphere) to show your support!
              - 👤 Follow the maintainer on GitHub: [@SatyamPandey-07](https://github.com/SatyamPandey-07)
              - 💼 Connect on LinkedIn: [Satyam Pandey](https://www.linkedin.com/in/satyam-pandey-0b246432a/)
              - 💬 Have questions or queries? Join our [WhatsApp Group](https://chat.whatsapp.com/D3pfq0vSmwd0iR0dFNjj43) or contact via phone at \`+91 9820866720\`.`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: prComment
              });

              // Assign PR author as assignee
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: [prAuthor]
              });

              // Request review from maintainer
              if (prAuthor !== 'SatyamPandey-07') {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    reviewers: ['SatyamPandey-07']
                  });
                } catch (error) {
                  console.log(`Failed to request review: ${error.message}`);
                }
              }
            }

            // 2. Fetch list of modified files in the PR to assign labels dynamically
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            let hasUI = false;
            let hasBackend = false;
            let hasTests = false;
            let hasDocs = false;

            for (const file of files) {
              const filename = file.filename;
              if (filename.includes('__tests__/') || filename.endsWith('.test.ts') || filename.endsWith('.test.tsx')) {
                hasTests = true;
              } else if (
                filename.startsWith('src/components/') || 
                (filename.startsWith('src/app/') && !filename.includes('/api/') && (filename.endsWith('.tsx') || filename.endsWith('.css')))
              ) {
                hasUI = true;
              } else if (
                filename.startsWith('src/app/api/') || 
                filename.startsWith('prisma/') || 
                filename.startsWith('src/lib/') || 
                filename === 'src/middleware.ts'
              ) {
                hasBackend = true;
              } else if (
                filename === 'README.md' ||
                filename.startsWith('docs/') ||
                filename.endsWith('.md')
              ) {
                hasDocs = true;
              }
            }

            // Always ensure the core scoring label is attached
            const labelsToAdd = ['ECSoC26', 'needs-review'];

            // Assign customized and quality-based bonus labels dynamically
            if (hasBackend) {
              labelsToAdd.push('good-backend'); // prioritizes higher-complexity backend tasks (+50 XP)
            } else if (hasUI) {
              labelsToAdd.push('good-ui'); // assigns frontend/UI task bonus (+25 XP)
            } else if (hasTests || hasDocs) {
              labelsToAdd.push('good-pr'); // assigns test/doc bonus (+15 XP)
            } else {
              labelsToAdd.push('good-pr'); // fallback bonus to ensure EVERY pull request receives a bonus label
            }

            console.log(`Auto-triage labels for PR #${prNumber}: ${labelsToAdd.join(', ')}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: labelsToAdd
            });
